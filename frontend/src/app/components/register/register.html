<div class="min-h-screen bg-slate-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <h2 class="text-center text-3xl font-extrabold text-slate-800">Crea il tuo account</h2>
    <p class="mt-2 text-center text-sm text-slate-500">Unisciti alla community di Eclettici</p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow sm:rounded-xl sm:px-10 border border-slate-100">

      @if (errorMessages.length > 0) {
        <div class="mb-4 p-4 bg-rose-50 border-l-4 border-rose-500 rounded-r-lg text-rose-700 text-sm">
          <p class="font-semibold mb-1">Si sono verificati i seguenti errori:</p>
          <ul class="list-disc pl-5 space-y-1">
            @for (msg of errorMessages; track msg) {
              <li>{{ msg }}</li>
            }
          </ul>
        </div>
      }

      <form (submit)="onRegister($event)" class="space-y-6">

        <div>
          <label for="nome" class="block text-sm font-medium text-slate-700">Nome</label>
          <input type="text" id="nome" name="nome" [(ngModel)]="registrationData.nome"
                 class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-lg text-sm shadow-sm placeholder-slate-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
        </div>

        <div>
          <label for="cognome" class="block text-sm font-medium text-slate-700">Cognome</label>
          <input type="text" id="cognome" name="cognome" [(ngModel)]="registrationData.cognome"
                 class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-lg text-sm shadow-sm placeholder-slate-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-slate-700">Indirizzo Email</label>
          <input type="email" id="email" name="email" [(ngModel)]="registrationData.email"
                 class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-lg text-sm shadow-sm placeholder-slate-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
          <input type="password" id="password" name="password" [(ngModel)]="registrationData.password"
                 class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-lg text-sm shadow-sm placeholder-slate-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
        </div>

        <div>
          <label for="ruolo" class="block text-sm font-medium text-slate-700">Tipo di Account</label>
          <select id="ruolo" name="ruolo" [(ngModel)]="registrationData.ruolo"
                  class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-lg text-sm shadow-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-slate-700">
            <option value="">Seleziona un ruolo...</option>
            <option value="STUDENT">Studente</option>
            <option value="STORE">Gestore Negozio</option>
          </select>
        </div>

        <div>
          <button type="submit"
                  class="w-full flex justify-center py-2 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors cursor-pointer">
            Registrati
          </button>
        </div>
      </form>

    </div>
  </div>
</div>
