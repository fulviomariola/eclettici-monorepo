<nav class="bg-slate-900 border-b border-slate-800 text-slate-100 px-4 sm:px-6 py-4 flex flex-col sm:flex-row items-center justify-between shadow-md gap-4 sm:gap-0">

  <div class="flex items-center space-x-2">
    <a routerLink="/" class="text-xl font-bold tracking-wider text-indigo-400 no-underline hover:text-indigo-300 transition">
      ECLETTICI
    </a>
  </div>

  <div class="flex flex-wrap items-center justify-center sm:justify-end gap-x-4 gap-y-2 sm:gap-x-6 text-sm font-medium w-full sm:w-auto">

    <a routerLink="/"
       routerLinkActive="text-indigo-400 font-semibold bg-slate-800/50"
       [routerLinkActiveOptions]="{exact: true}"
       class="hover:text-white transition no-underline px-3 py-2 rounded-lg text-slate-300">
       Home
    </a>
    <a routerLink="/cosa-mi-ha-portato-qui"
       routerLinkActive="text-indigo-400 font-semibold bg-slate-800/50"
       [routerLinkActiveOptions]="{exact: true}"
       class="hover:text-white transition no-underline px-3 py-2 rounded-lg text-slate-300">
       Cosa mi ha portato qui
    </a>
    <a routerLink="/videolezioni"
       routerLinkActive="text-indigo-400 font-semibold bg-slate-800/50"
       [routerLinkActiveOptions]="{exact: true}"
       class="hover:text-white transition no-underline px-3 py-2 rounded-lg text-slate-300">
       Videolezioni
    </a>

    @if (currentRole$ | async; as ruolo) {
      @if (ruolo === 'STUDENT' || ruolo === 'STORE') {
        <a routerLink="/corsi"
           routerLinkActive="text-indigo-400 font-semibold bg-slate-800/50"
           [routerLinkActiveOptions]="{exact: true}"
           class="hover:text-white transition no-underline px-3 py-2 rounded-lg text-slate-300">
          I Miei Corsi
        </a>
      }
      @if (ruolo === 'STORE') {
        <a routerLink="/gestione-video"
           routerLinkActive="text-indigo-400 font-semibold bg-slate-800/50"
           [routerLinkActiveOptions]="{exact: true}"
           class="hover:text-white transition no-underline px-3 py-2 rounded-lg text-slate-300">
          Pannello Controllo
        </a>
        <a routerLink="/admin/nuovo-video"
           routerLinkActive="text-indigo-400 font-semibold bg-slate-800/50"
           [routerLinkActiveOptions]="{exact: true}"
           class="hover:text-white transition no-underline px-3 py-2 rounded-lg text-slate-300">
          Nuovo Video
        </a>
      }

      @if (ruolo === 'STUDENT' || ruolo === 'STORE') {
        <a routerLink="/dashboard"
           routerLinkActive="text-indigo-400 font-semibold bg-slate-800/50"
           [routerLinkActiveOptions]="{exact: true}"
           class="hover:text-white transition no-underline ml-auto px-3 py-2 rounded-lg text-slate-300">
          Dashboard
        </a>
      }

      <button
        (click)="eseguiLogout()"
        class="bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 py-1.5 px-3 sm:px-4 rounded-lg transition text-xs font-semibold ml-2">
        Esci
      </button>

    } @else {
      <a
        routerLink="/login"
        class="bg-indigo-600 hover:bg-indigo-500 text-white py-1.5 px-4 rounded-lg transition text-xs font-semibold no-underline shadow-sm ml-auto">
        Accedi
      </a>
    }

  </div>
</nav>
