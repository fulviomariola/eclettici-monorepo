<nav class="bg-slate-900 border-b border-slate-800 text-slate-100 px-4 sm:px-6 py-4 flex flex-col sm:flex-row items-center justify-between shadow-md gap-4 sm:gap-0">

  <div class="flex items-center space-x-2">
    <a routerLink="/" class="text-xl font-bold tracking-wider text-indigo-400 no-underline hover:text-indigo-300 transition">
      ECLETTICI
    </a>
  </div>
  <div class="flex flex-wrap items-center justify-center sm:justify-end gap-x-4 gap-y-2 sm:gap-x-6 text-sm font-medium">

    <a routerLink="/" routerLinkActive="text-indigo-400" [routerLinkActiveOptions]="{exact: true}" class="text-slate-300 hover:text-white transition no-underline">Home</a>
    <a routerLink="/cosa-mi-ha-portato-qui" routerLinkActive="text-indigo-400" class="text-slate-300 hover:text-white transition no-underline">Cosa mi ha portato qui</a>
    <a routerLink="/youtube" routerLinkActive="text-indigo-400" class="text-slate-300 hover:text-white transition no-underline">Videolezioni</a>

    @if (currentRole$ | async; as ruolo) {
      @if (ruolo === 'STUDENT') {
        <a routerLink="/corsi" routerLinkActive="text-indigo-400" class="text-slate-300 hover:text-white transition no-underline">I Miei Corsi</a>
        <a routerLink="/dashboard" routerLinkActive="text-indigo-400" class="text-slate-300 hover:text-white transition no-underline">Dashboard</a>
      }
      @if (ruolo === 'STORE') {
        <a routerLink="/admin/controllo" routerLinkActive="text-indigo-400" class="text-slate-300 hover:text-white transition no-underline">Pannello Controllo</a>
        <a routerLink="/admin/nuovo-video" routerLinkActive="text-indigo-400" class="text-slate-300 hover:text-white transition no-underline">Nuovo Video</a>
      }
      <button
        (click)="eseguiLogout()"
        class="bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 py-1.5 px-3 sm:px-4 rounded-lg transition text-xs font-semibold ml-2">
        Esci
      </button>
    } @else {
      <a
        routerLink="/login"
        class="bg-indigo-600 hover:bg-indigo-500 text-white py-1.5 px-4 rounded-lg transition text-xs font-semibold no-underline shadow-sm ml-2">
        Accedi
      </a>
    }
  </div>
</nav>
