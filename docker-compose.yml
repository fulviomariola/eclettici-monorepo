services:
  postgres-vector:
    image: pgvector/pgvector:pg16
    container_name: eclettici-db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - eclettici_net

volumes:
  pgdata:

networks:
  eclettici_net:
    driver: bridge
